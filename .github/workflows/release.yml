name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Install cross for Linux arm64
        if: matrix.use_cross == true
        shell: bash
        run: cargo install cross --locked

      - name: Package release artifact
        shell: bash
        env:
          DEVENV_BUILD_GIT_SHA: ${{ github.sha }}
          DEVENV_RELEASE_TARGET: ${{ matrix.target }}
          DEVENV_USE_CROSS: ${{ matrix.use_cross && '1' || '' }}
        run: scripts/package-release.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: devenv-${{ matrix.target }}
          path: |
            target/dist/devenv-*.tar.gz
            target/dist/devenv-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Write aggregate checksum file
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -name '*.tar.gz.sha256' -print0 | sort -z | xargs -0 cat > release-assets/SHA256SUMS
          cat release-assets/SHA256SUMS

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files="$(find release-assets -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' -o -name 'SHA256SUMS' \) -print)"
          gh release create "${GITHUB_REF_NAME}" $files --repo "${GITHUB_REPOSITORY}" --verify-tag --title "${GITHUB_REF_NAME}" --notes "DevEnv ${GITHUB_REF_NAME} release artifacts."

      - name: Smoke npm package
        shell: bash
        run: scripts/npm-smoke.sh

      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish npm package
        shell: bash
        run: |
          set -euo pipefail
          npm publish target/npm/@sponzey/devenv --access public
